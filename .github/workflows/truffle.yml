name: TruffleHog Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  trufflehog:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        run: |
          docker run --rm \
            -v "$PWD:/pwd" \
            trufflesecurity/trufflehog:latest \
            git file:///pwd \
            --only-verified \
            --fail
